<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Jarad Harper" />
    <meta
      name="description"
      content="This is a learning application that holds and presents information regarding coding in the same style as flashcards."
    />
    <meta
      name="keywords"
      content="study aids, flashcards, study guide, learning materials, education"
    />
    <link rel="icon" type="image/png" href="./favicon.ico" />
    <link
      rel="stylesheet"
      type="text/css"
      href="./assets/vendor/normalize.css"
    />
    <link rel="stylesheet" type="text/css" href="./assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nabla&family=Sankofa+Display&display=swap"
      rel="stylesheet"
    />
    <title>Carousel</title>
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a class="header__link" href="/">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="/">My Decks</a></li>
          <li><a class="nav__link" href="">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content page__main-content_location_carousel">
      <section id="carousel" class="carousel">
        <h2 class="carousel__title">HTML Tags Deck &middot 1/10</h2>
        <div class="carousel__card">
          <button
            type="button"
            aria-label="Go to previous card in deck"
            class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
          ></button>
          <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt</p>
          <button
            type="button"
            aria-label="Go to next card in deck"
            class="carousel__btn carousel__btn_type_right"
          ></button>
        </div>
        <button
          type="button"
          aria-label="FLip card"
          class="carousel__btn carousel__btn_type_flip"
        ></button>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">&copy; Jarad Micahel Harper</p>
    </footer>
  </body>
</html>
