<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Jarad Harper" />
    <meta
      name="description"
      content="This is a learning application that holds and presents information regarding coding in the same style as flashcards."
    />
    <meta
      name="keywords"
      content="study aids, flashcards, study guide, learning materials, education"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="./assets/vendor/normalize.css"
    />
    <link rel="stylesheet" type="text/css" href="./assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nabla&family=Sankofa+Display&display=swap"
      rel="stylesheet"
    />
    <title>Card Decks</title>
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a class="header__link" href="#home">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="#home">My Decks</a></li>
          <li><a class="nav__link" href="#about">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content">
      <section id="home">
        <h2 class="section__title">My Decks</h2>
        <div class="decks">
          <ul class="decks__list">
            <template id="my-template">
              <li class="deck deck_color_green">
                <a class="deck__link" href="#"></a>
                <h3 class="deck__title">Basic HTML Tags</h3>
                <div class="deck__row">
                  <p class="deck__count">10 Cards</p>
                  <button
                    aria-label="Delete this deck"
                    type="button"
                    class="button deck__delete-btn"
                  >
                    <img
                      src="./assets/images/delete.svg"
                      alt="image of a trashcan"
                    />
                  </button>
                </div>
              </li>
            </template>
          </ul>

          <button type="button" class="button decks__new-deck-btn">
            + New Deck
          </button>
        </div>
      </section>

      <section id="not-found" class="not-found">
        <h2 class="not-found__status-code">404</h2>
        <p class="not-found__text">Sorry, nothing found!</p>
      </section>

      <section id="carousel" class="carousel">
        <h2 class="carousel__title">HTML Tags Deck &middot; 1/10</h2>
        <div class="carousel__card">
          <button
            type="button"
            aria-label="Go to previous card in deck"
            class="button carousel__btn carousel__btn_type_left carousel__btn_disabled"
          ></button>
          <p class="carousel__card-text">text</p>
          <button
            type="button"
            aria-label="Go to next card in deck"
            class="button carousel__btn carousel__btn_type_right"
          ></button>
        </div>
        <button
          type="button"
          aria-label="FLip card"
          class="button carousel__btn carousel__btn_type_flip"
        ></button>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">&copy; Jarad Micahel Harper</p>
    </footer>
    <script src="assets/js/index.js" type="module"></script>
  </body>
</html>
